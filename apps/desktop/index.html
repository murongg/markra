<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markra</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const isSettingsWindow = params.has("settings");

        const appearanceMode = isSettingsWindow ? params.get("startupAppearanceMode") : "system";
        const prefersDark =
          typeof window.matchMedia === "function" &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolvedAppearance =
          appearanceMode === "light" || (appearanceMode === "system" && !prefersDark) ? "light" : "dark";
        const theme =
          resolvedAppearance === "dark"
            ? params.get("startupDarkTheme") || "dark"
            : params.get("startupLightTheme") || "light";
        const background = resolvedAppearance === "dark" ? "#1e1e1e" : "#ffffff";
        const root = document.documentElement;

        if (isSettingsWindow) root.dataset.window = "settings";
        root.dataset.theme = theme;
        root.style.backgroundColor = background;
        root.style.colorScheme = resolvedAppearance;

        const style = document.createElement("style");
        style.id = "markra-startup-theme-style";
        style.textContent = `html,body,#root{background:${background};color-scheme:${resolvedAppearance};}`;
        document.head.append(style);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
